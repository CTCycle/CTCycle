<style>
  :root {

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: 32px 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 24px; padding-bottom: 24px;
    border-bottom: 1px solid var(--divider);
  }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header .meta { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
    align-items: center;
  }
  #search {
    flex: 1; min-width: 200px;
    padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  .filter-group, .sort-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn, .sort-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover, .sort-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active, .sort-btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .ctrl-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .stats-bar {
    display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
    padding: 16px; background: var(--surface); border-radius: var(--card-radius);
    border: 1px solid var(--border);
  }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .section { margin-bottom: 28px; }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--divider);
  }
  .section-title { font-size: 18px; font-weight: 600; }
  .section-count { font-size: 13px; color: var(--text-muted); background: var(--surface); padding: 2px 10px; border-radius: 12px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--card-radius); padding: 16px 20px;
    margin-bottom: 8px; transition: border-color 0.2s, background 0.2s;
  }
  .card:hover { border-color: #484f58; background: var(--surface-hover); }
  .card.hidden { display: none; }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; margin-bottom: 8px;
  }
  .card-name {
    font-size: 16px; font-weight: 600; color: var(--accent); text-decoration: none;
  }
  .card-name:hover { text-decoration: underline; }

  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .badge-public { background: #1a3a2a; color: var(--green); border: 1px solid #2ea043; }
  .badge-private { background: #1c2128; color: var(--text-muted); border: 1px solid var(--border); }
  .badge-lang { color: #fff; }
  .badge-ahead { background: #1a3a2a; color: var(--green); border: 1px solid #2ea043; }
  .badge-behind { background: #3d1f1f; color: var(--red); border: 1px solid #da3633; }
  .badge-tag { background: #1c2128; color: var(--yellow); border: 1px solid #7a5f0d; }
  .badge-dirty { background: #3d2e0f; color: var(--yellow); border: 1px solid #bb8009; }
  .badge-clean { background: #1a2a1a; color: var(--green); border: 1px solid #1f6f1f; }
  .badge-remote { background: #1c1c2a; color: #a371f7; border: 1px solid #5a3d99; }
  .badge-local-only { background: #2a1c1c; color: var(--orange); border: 1px solid #8b5a2b; }
  .badge-stars { background: #1c2128; color: var(--yellow); border: 1px solid #7a5f0d; }

  .card-desc {
    color: var(--text-muted); font-size: 13px; margin-bottom: 10px; line-height: 1.4;
  }
  .card-details {
    display: flex; flex-wrap: wrap; gap: 16px;
    font-size: 12px; color: var(--text-dim);
  }
  .card-details span { display: inline-flex; align-items: center; gap: 4px; }
  .card-details a { color: var(--text-dim); text-decoration: none; }
  .card-details a:hover { color: var(--accent); }

  .branches-list {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--divider);
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .branch-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 8px; border-radius: 4px;
    background: #1c2128; border: 1px solid var(--border);
    font-size: 11px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  .branch-tag.current { border-color: var(--accent); color: var(--accent); }

  .tech-tags {
    margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px;
  }
  .tech-tag {
    padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 500;
    background: #1c2128; color: var(--text-muted); border: 1px solid var(--border);
  }

  .no-results {
    text-align: center; padding: 48px 0; color: var(--text-dim);
    font-size: 16px;
  }

  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .stats-bar { flex-wrap: wrap; gap: 12px; }
    .card-header { flex-direction: column; }
    .controls { flex-direction: column; align-items: stretch; }
  }
</style>

let currentFilter = 'all';
let currentSort = 'group';

function init() {
  document.getElementById('total-repos').textContent = DATA.total_repos;
  document.getElementById('update-date').textContent = DATA.generated_at;

  // Filter buttons
  const groups = [...new Set(DATA.repos.map(r => r.group))];
  const filterDiv = document.getElementById('filter-btns');
  filterDiv.innerHTML = '<button class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">All</button>';
  groups.forEach(g => {
    const count = DATA.repos.filter(r => r.group === g).length;
    filterDiv.innerHTML += '<button class="filter-btn" data-filter="' + g + '" onclick="setFilter(\'' + g + '\')">' + g + ' (' + count + ')</button>';
  });
  // Add source-based filters
  filterDiv.innerHTML += '<button class="filter-btn" data-filter="pub" onclick="setFilter(\'pub\')">Public</button>';
  filterDiv.innerHTML += '<button class="filter-btn" data-filter="dirty" onclick="setFilter(\'dirty\')">Dirty</button>';

  renderStats();
  renderSections();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  filterRepos();
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === sort);
  });
  renderSections();
}

function filterRepos() {
  const search = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const group = card.dataset.group;
    const text = card.dataset.search.toLowerCase();
    const isPublic = card.dataset.public === 'true';
    const isDirty = card.dataset.dirty === 'true';

    let matchesFilter;
    switch (currentFilter) {
      case 'all': matchesFilter = true; break;
      case 'pub': matchesFilter = isPublic; break;
      case 'dirty': matchesFilter = isDirty; break;
      default: matchesFilter = group === currentFilter;
    }
    const matchesSearch = !search || text.includes(search);
    card.classList.toggle('hidden', !(matchesFilter && matchesSearch));
  });
  document.querySelectorAll('.section').forEach(section => {
    const visible = section.querySelectorAll('.card:not(.hidden)').length > 0;
    section.classList.toggle('hidden', !visible);
  });
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const total = DATA.total_repos;
  const publicCount = DATA.repos.filter(r => {
    const gh = r.gh || {};
    return gh.visibility === 'PUBLIC';
  }).length;
  const privateCount = DATA.repos.filter(r => {
    const gh = r.gh || {};
    return gh.visibility === 'PRIVATE';
  }).length;
  const dirtyCount = DATA.repos.filter(r => {
    const gs = r.git_status || {};
    return gs.is_dirty;
  }).length;
  const allLangs = new Set();
  DATA.repos.forEach(r => {
    (r.technologies || []).forEach(t => allLangs.add(t));
    const gh = r.gh || {};
    if (gh.primaryLanguage && gh.primaryLanguage.name) allLangs.add(gh.primaryLanguage.name);
  });
  const totalStars = DATA.repos.reduce((sum, r) => {
    const gh = r.gh || {};
    return sum + (gh.stargazerCount || 0);
  }, 0);
  const totalFiles = DATA.repos.reduce((sum, r) => sum + (r.file_count || 0), 0);

  bar.innerHTML =
    '<div class="stat"><span class="stat-value">' + total + '</span><span class="stat-label">Total Projects</span></div>' +
    '<div class="stat"><span class="stat-value">' + publicCount + '</span><span class="stat-label">Public</span></div>' +
    '<div class="stat"><span class="stat-value">' + privateCount + '</span><span class="stat-label">Private</span></div>' +
    '<div class="stat"><span class="stat-value">' + dirtyCount + '</span><span class="stat-label">Dirty</span></div>' +
    '<div class="stat"><span class="stat-value">' + allLangs.size + '</span><span class="stat-label">Languages</span></div>' +
    '<div class="stat"><span class="stat-value">' + totalStars + '</span><span class="stat-label">Stars</span></div>' +
    '<div class="stat"><span class="stat-value">' + totalFiles.toLocaleString() + '</span><span class="stat-label">Tracked Files</span></div>';
}

function sortRepos(repos) {
  switch (currentSort) {
    case 'name':
      return repos.sort((a, b) => a.display_name.localeCompare(b.display_name));
    case 'stars':
      return repos.sort((a, b) => ((b.gh || {}).stargazerCount || 0) - ((a.gh || {}).stargazerCount || 0));
    case 'updated':
      return repos.sort((a, b) => {
        const da = (a.gh || {}).updatedAt || '';
        const db = (b.gh || {}).updatedAt || '';
        return db.localeCompare(da);
      });
    case 'group':
    default:
      return repos;  // keep group order
  }
}

function renderSections() {
  const container = document.getElementById('sections');
  const groups = ['Active', 'Data Analysis', 'Dismissed', 'Tools & Config', 'Remote Only'];

  if (currentSort !== 'group') {
    // Flat layout when sorting
    const repos = sortRepos([...DATA.repos]);
    let html = '<div class="section"><div class="section-header"><span class="section-title">All Projects</span></div>';
    repos.forEach(r => { html += renderCard(r); });
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  let html = '';
  groups.forEach(group => {
    const repos = sortRepos(DATA.repos.filter(r => r.group === group));
    if (repos.length === 0) return;

    html += '<div class="section">' +
      '<div class="section-header">' +
        '<span class="section-title">' + group + '</span>' +
        '<span class="section-count">' + repos.length + '</span>' +
      '</div>';
    repos.forEach(r => { html += renderCard(r); });
    html += '</div>';
  });

  container.innerHTML = html;
}

function renderCard(r) {
  const gh = r.gh || {};
  const visibility = gh.visibility || 'unknown';
  const lang = gh.primaryLanguage || {};
  const langName = lang.name || '';
  const langColor = LANG_COLORS[langName] || '#8b949e';
  const desc = r.readme_description || gh.description || '';
  const ghUrl = r.gh_slug ? 'https://github.com/' + r.gh_slug : '';
  const localUrl = r.local_path ? 'file:///' + r.local_path.replace(/\\\\/g, '/').replace(/\\/g, '/').replace(/^([A-Z]):/, (_, d) => d.toLowerCase()) + '/' : '';
  const updatedAt = gh.updatedAt ? gh.updatedAt.split('T')[0] : '';
  const stars = gh.stargazerCount || 0;
  const forks = gh.forkCount || 0;
  const gs = r.git_status || {};
  const isDirty = gs.is_dirty || false;
  const technologies = r.technologies || [];
  const sourceBadge = r.source === 'remote_only' ? 'remote' : (r.source === 'local_only' ? 'local-only' : '');

  // Build searchable text
  const searchText = [r.display_name, desc, langName, r.group, r.gh_slug]
    .concat(technologies).filter(Boolean).join(' ').toLowerCase();

  let html = '<div class="card" data-group="' + r.group + '" data-search="' + escAttr(searchText) +
    '" data-public="' + (visibility === 'PUBLIC') + '" data-dirty="' + isDirty + '">';

  // Header row
  html += '<div class="card-header">';
  html += '<a class="card-name" href="' + (ghUrl || '#') + '" target="_blank" title="Open on GitHub">' + r.display_name + '</a>';
  html += '<div class="card-badges">';

  // Source badge
  if (sourceBadge === 'remote') {
    html += '<span class="badge badge-remote">Remote only</span>';
  } else if (sourceBadge === 'local-only') {
    html += '<span class="badge badge-local-only">Local only</span>';
  }

  // Visibility
  if (visibility === 'PUBLIC') {
    html += '<span class="badge badge-public">Public</span>';
  } else if (visibility === 'PRIVATE') {
    html += '<span class="badge badge-private">Private</span>';
  }

  // Language
  if (langName) {
    html += '<span class="badge badge-lang" style="background:' + langColor + '">' + langName + '</span>';
  }

  // Tag
  if (r.last_tag) {
    html += '<span class="badge badge-tag">' + r.last_tag + '</span>';
  }

  // Stars
  if (stars > 0) {
    html += '<span class="badge badge-stars">' + stars + ' star' + (stars !== 1 ? 's' : '') + '</span>';
  }

  // Ahead / behind
  if (r.ahead > 0) {
    html += '<span class="badge badge-ahead">+' + r.ahead + ' ahead</span>';
  }
  if (r.behind > 0) {
    html += '<span class="badge badge-behind">-' + r.behind + ' behind</span>';
  }

  // Dirty / clean
  if (r.source !== 'remote_only') {
    if (isDirty) {
      html += '<span class="badge badge-dirty">Dirty</span>';
    } else {
      html += '<span class="badge badge-clean">Clean</span>';
    }
  }

  html += '</div></div>';

  // Description
  if (desc) {
    html += '<div class="card-desc">' + escHtml(desc) + '</div>';
  }

  // Details row
  html += '<div class="card-details">';
  if (ghUrl) {
    html += '<span><a href="' + ghUrl + '" target="_blank">' + r.gh_slug + '</a></span>';
  }
  if (updatedAt) {
    html += '<span>Updated ' + updatedAt + '</span>';
  }
  if (forks > 0) {
    html += '<span>' + forks + ' fork' + (forks !== 1 ? 's' : '') + '</span>';
  }
  if (r.last_commit && r.last_commit.sha) {
    html += '<span>Last: ' + r.last_commit.sha.substring(0, 7) + ' ' + escHtml(r.last_commit.message || '').substring(0, 60) + '</span>';
  }
  if (r.file_count > 0) {
    html += '<span>' + r.file_count.toLocaleString() + ' files</span>';
  }
  if (r.commit_count > 0) {
    html += '<span>' + r.commit_count + ' commits</span>';
  }
  if (r.last_fetch) {
    html += '<span>Fetched ' + r.last_fetch + '</span>';
  }
  if (localUrl) {
    html += '<span><a href="' + localUrl + '" target="_blank">Open folder</a></span>';
  }
  html += '</div>';

  // Technologies
  if (technologies.length > 0) {
    html += '<div class="tech-tags">';
    technologies.forEach(t => {
      html += '<span class="tech-tag">' + t + '</span>';
    });
    html += '</div>';
  }

  // Branches
  const branchNames = Object.keys(r.branches || {});
  if (branchNames.length > 0) {
    html += '<div class="branches-list">';
    branchNames.forEach(b => {
      const br = r.branches[b];
      const cls = br.current ? 'branch-tag current' : 'branch-tag';
      html += '<span class="' + cls + '">' + b + '</span>';
    });
    html += '</div>';
  }

  // Open PRs
  const prs = r.open_prs || [];
  if (prs.length > 0) {
    html += '<div class="branches-list" style="margin-top:4px;padding-top:4px;">';
    prs.forEach(pr => {
      html += '<span class="branch-tag" style="color:var(--green);border-color:#2ea043;">' +
        '<a href="' + ghUrl + '/pull/' + pr.number + '" target="_blank" style="color:inherit;text-decoration:none;">PR #' +
        pr.number + ': ' + escHtml(pr.title) + '</a></span>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
