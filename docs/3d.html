  // Number markers (small dots around rim)

  const wire=new THREE.Mesh(new THREE.SphereGeometry(R*.98,24,24),new THREE.MeshBasicMaterial({color:0x58a6ff,wireframe:true,transparent:true,opacity:.15}));g.add(wire);
  // Lat/long rings
  for(let i=0;i<4;i++){const ring=new THREE.Mesh(new THREE.TorusGeometry(R*.97,.02,8,48),M(0x58a6ff,{emissive:0x58a6ff,emissiveIntensity:.2,roughness:.1}));ring.rotation.x=Math.PI/2;ring.rotation.y=i*Math.PI/4;g.add(ring)}
  // Axis
  const axis=new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,R*1.3,6),M(0x58a6ff,{emissive:0x58a6ff,emissiveIntensity:.3}));g.add(axis);
  return g;
}

// 14. CRYSTAL BALL — WFLCAST
function buildCrystalball(b,stars,isPublic,langColor){
  const g=new THREE.Group();const R=b*.6;
  const ball=new THREE.Mesh(new THREE.SphereGeometry(R,24,24),new THREE.MeshPhysicalMaterial({color:0xd4d4ff,roughness:.05,metalness:0,transparent:true,opacity:.4,clearcoat:.5}));g.add(ball);
  // Inner swirling particles
  for(let i=0;i<Math.min(stars+8,15);i++){const p=new THREE.Mesh(new THREE.SphereGeometry(.03,4,4),M(0xd4d4ff,{emissive:0xd4d4ff,emissiveIntensity:.7}));const a=Math.random()*Math.PI*2;const pr=R*.3+Math.random()*R*.4;p.position.set(Math.cos(a)*pr,Math.random()*R*.5-R*.25,Math.sin(a)*pr);p.userData={swirl:true,speed:.3+Math.random()*.5,offset:Math.random()*Math.PI*2};g.add(p)}
  // Base
  const base=new THREE.Mesh(new THREE.CylinderGeometry(R*.5,R*.6,.1,16),M(0xd4af37,{roughness:.2,metalness:.7}));base.position.y=-R*.5;g.add(base);
  return g;
}

// 15. ECG WAVEFORM — EOC
function buildWaveform(b,stars,isPublic,langColor){
  const g=new THREE.Group();const R=b*.6;
  // Flat platform
  const plat=new THREE.Mesh(new THREE.BoxGeometry(R*1.6,.06,R*1.2),M(0x0d1117,{roughness:.6}));g.add(plat);
  // Waveform ribbon (curved line with spike)
  const pts=[];for(let i=0;i<40;i++){const x=(i/39-.5)*R*1.4;let y=Math.sin(i*.4)*.15;if(i>16&&i<22)y=.5;pts.push(new THREE.Vector3(x,.08,y))}
  const curve=new THREE.CatmullRomCurve3(pts);const waveGeo=new THREE.TubeGeometry(curve,64,.02,8,false);
  const wave=new THREE.Mesh(waveGeo,M(0x3fb950,{emissive:0x3fb950,emissiveIntensity:.8,roughness:.1}));g.add(wave);
  // Heart rate dots
  for(let d=0;d<Math.min(stars+2,5);d++){const dot=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),M(0xff3333,{emissive:0xff3333,emissiveIntensity:.7}));dot.position.set((d-2)*.25,.12,-.2);g.add(dot)}
  return g;
}

// 16. JOINT ARTICULATION — DIREU
function buildJoint(b,stars,isPublic,langColor){
  const g=new THREE.Group();const R=b*.5;
  // Ball joint
  const ball=new THREE.Mesh(new THREE.SphereGeometry(R*.4,16,16),M(0xf5f5dc,{roughness:.15,metalness:.2,emissive:0xf5f5dc,emissiveIntensity:.15}));g.add(ball);
  // Socket ring
  g.add(new THREE.Mesh(new THREE.TorusGeometry(R*.42,.04,8,24),M(0x58a6ff,{emissive:0x58a6ff,emissiveIntensity:.4,roughness:.1})));
  // Connecting bone segments
  for(let side=-1;side<=1;side+=2){
    for(let s=0;s<3;s++){const seg=new THREE.Mesh(new THREE.CylinderGeometry(R*.12,R*.14,.3,8),M(langColor,{roughness:.3}));seg.position.set(side*.3,side*(.5+s*.3),0);g.add(seg)}
  }
  return g;
}

// 17. GEAR NEST — Python environments
function buildGearnest(b,stars,isPublic,langColor){
  const g=new THREE.Group();const R=b*.5;
  // Gear approximation (torus with teeth)
  const gearBody=new THREE.Mesh(new THREE.TorusGeometry(R*.7,.08,8,32),M(langColor,{roughness:.2,metalness:.7}));g.add(gearBody);
  // Teeth
  for(let i=0;i<16;i++){const a=i*Math.PI/8;const tooth=new THREE.Mesh(new THREE.BoxGeometry(.04,.1,R*.15),M(langColor,{roughness:.2,metalness:.6}));tooth.position.set(Math.cos(a)*R*.8,0,Math.sin(a)*R*.8);tooth.rotation.y=a;g.add(tooth)}
  // Snake coil (torus segments)
  const coil=new THREE.Mesh(new THREE.TorusGeometry(R*.35,.05,8,16,Math.PI*1.5),M(0x3fb950,{emissive:0x3fb950,emissiveIntensity:.4,roughness:.3}));coil.rotation.x=Math.PI/3;coil.position.y=.15;g.add(coil);
  // Python egg (sphere)
  g.add(new THREE.Mesh(new THREE.SphereGeometry(R*.25,12,12),M(0x306998,{emissive:0x306998,emissiveIntensity:.5,roughness:.2}))).translateY(.2);
  return g;
}

const BUILDERS={roulette:buildRoulette,lattice:buildLattice,spider:buildSpider,hourglass:buildHourglass,nodegraph:buildNodegraph,gauge:buildGauge,crystal:buildCrystalShape,cardstack:buildCardstack,shield:buildShield,xrayfilm:buildXrayfilm,book:buildBook,moonring:buildMoonring,globe:buildGlobe,crystalball:buildCrystalball,waveform:buildWaveform,joint:buildJoint,gearnest:buildGearnest};

// ── Create Islands ───────────────────────────────────────────────────────────
const islands=[],clickTargets=[];
repos.forEach((proj,i)=>{
  const gh=proj.gh||{};const stars=gh.stargazerCount||0;const isPublic=gh.visibility==='PUBLIC';
  const langName=(gh.primaryLanguage||{}).name||(proj.technologies||[])[0]||'Unknown';
  const langColor=LANG_COLORS[langName]||0x8b949e;
  const fileCount=proj.file_count||10;const isDirty=(proj.git_status||{}).is_dirty;
  const baseSize=.55+Math.log2(fileCount+1)*.35;
  const shapeId=proj._shape||'crystal';

  const group=new THREE.Group();group.position.set(proj._x,proj._y,proj._z);group.userData={project:proj,baseY:proj._y};

  // Build essence shape
  const builder=BUILDERS[shapeId]||BUILDERS.crystal;
  const mesh=builder(baseSize,stars,isPublic,langColor);group.add(mesh);

  // Glow platform
  const glowGeo=new THREE.CylinderGeometry(baseSize*1.1,baseSize*1.3,.06,24);
  const glowCol=isPublic?0x1a3a2a:0x161a22;
  const glow=new THREE.Mesh(glowGeo,new THREE.MeshStandardMaterial({color:glowCol,emissive:glowCol,emissiveIntensity:.5,roughness:.5,transparent:true,opacity:.7}));
  glow.position.y=-.03;glow.castShadow=true;group.add(glow);

  // Dirty indicators
  if(isDirty&&proj.source!=='remote_only'){for(let d=0;d<3;d++){const dp=new THREE.Mesh(new THREE.SphereGeometry(.05,4,4),M(0xd29922,{emissive:0xd29922,emissiveIntensity:.7}));dp.userData={dirty:true,offset:Math.random()*Math.PI*2,speed:.5+Math.random()};dp.position.set((Math.random()-.5)*baseSize,.3+Math.random()*.3,(Math.random()-.5)*baseSize);group.add(dp)}}

  // Label sprite
  const canvas=document.createElement('canvas');canvas.width=256;canvas.height=48;
  const ctx=canvas.getContext('2d');ctx.fillStyle=isPublic?'#e6edf3':'#6e7681';ctx.font='bold 14px -apple-system,sans-serif';ctx.textAlign='center';
  const lbl=proj.display_name.length>24?proj.display_name.substring(0,22)+'…':proj.display_name;ctx.fillText(lbl,128,28);
  const tex=new THREE.CanvasTexture(canvas);tex.minFilter=THREE.LinearFilter;
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));
  sprite.position.y=baseSize+1;sprite.scale.set(3,.56,1);group.add(sprite);

  // Click target
  const clickGeo=new THREE.CylinderGeometry(baseSize*1.2,baseSize*1.2,baseSize*2+.8,8);
  const clickObj=new THREE.Mesh(clickGeo,new THREE.MeshBasicMaterial({visible:false}));
  clickObj.position.y=0;clickObj.userData={isClickTarget:true,islandGroup:group};group.add(clickObj);clickTargets.push(clickObj);

  scene.add(group);islands.push(group);
});

// ── Connection lines ─────────────────────────────────────────────────────────
const groupMap={};islands.forEach(is=>{const g=is.userData.project._group;(groupMap[g]=groupMap[g]||[]).push(is)});
Object.values(groupMap).forEach(gi=>{if(gi.length<2)return;for(let i=0;i<gi.length;i++){for(let j=i+1;j<gi.length;j++){const a=gi[i].position,b=gi[j].position;const dist=a.distanceTo(b);if(dist>18)continue;const mid=new THREE.Vector3().addVectors(a,b).multiplyScalar(.5);const dir=new THREE.Vector3().subVectors(b,a).normalize();const curve=new THREE.QuadraticBezierCurve3(a.clone().add(new THREE.Vector3(0,1.2,0)),mid.clone().add(new THREE.Vector3(0,dist*.25,0)),b.clone().add(new THREE.Vector3(0,1.2,0)));const pts=curve.getPoints(24);const lg=new THREE.BufferGeometry().setFromPoints(pts);scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0x21262d,transparent:true,opacity:.3,depthWrite:false})))}}});

// ── Interaction ──────────────────────────────────────────────────────────────
const dashboard=document.getElementById('dashboard'),raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
let selectedIsland=null,targetLookAt=new THREE.Vector3(),targetCamPos=new THREE.Vector3(),isAnimating=false,animStart=0;
let startCamPos=camera.position.clone(),startTarget=controls.target.clone();
const DUR=900;

function showDashboard(proj){
  const gh=proj.gh||{};const isPublic=gh.visibility==='PUBLIC';const stars=gh.stargazerCount||0;const forks=gh.forkCount||0;
  const isDirty=(proj.git_status||{}).is_dirty;const langName=(gh.primaryLanguage||{}).name||(proj.technologies||[])[0]||'?';
  const langHex='#'+(LANG_COLORS[langName]||0x8b949e).toString(16).padStart(6,'0');
  const ghUrl=proj.gh_slug?'https://github.com/'+proj.gh_slug:'';const localPath=proj.local_path||'';
  const localUrl=localPath?'file:///'+localPath.replace(/\\\\/g,'/').replace(/\\/g,'/').replace(/^([A-Z]):/,(_,d)=>d.toLowerCase())+'/':'';
  document.getElementById('dash-title').textContent=proj.display_name;
  document.getElementById('dash-group').textContent=proj._group+' · '+(isPublic?'Public':'Private')+' · shape: '+proj._shape;
  document.getElementById('dash-desc').textContent=proj.readme_description||gh.description||'';
  const gs=proj.git_status||{};
  document.getElementById('dash-stats').innerHTML=
    `<div class="dstat"><div class="dstat-val">${stars}</div><div class="dstat-label">Stars</div></div>`+
    `<div class="dstat"><div class="dstat-val">${forks}</div><div class="dstat-label">Forks</div></div>`+
    `<div class="dstat"><div class="dstat-val">${(proj.commit_count||0)}</div><div class="dstat-label">Commits</div></div>`+
    `<div class="dstat"><div class="dstat-val">${(proj.file_count||0).toLocaleString()}</div><div class="dstat-label">Files</div></div>`+
    `<div class="dstat"><div class="dstat-val">${Object.keys(proj.branches||{}).length}</div><div class="dstat-label">Branches</div></div>`+
    `<div class="dstat"><div class="dstat-val">${gs.is_dirty?'Dirty':'Clean'}</div><div class="dstat-label">Status</div></div>`;
  let badges=`<span class="dbadge ${isPublic?'dbadge-public':'dbadge-private'}">${isPublic?'Public':'Private'}</span>`+
    `<span class="dbadge ${isDirty?'dbadge-dirty':'dbadge-clean'}">${isDirty?'Dirty':'Clean'}</span>`+
    `<span class="dbadge dbadge-lang" style="background:${langHex}">${langName}</span>`;
  (proj.technologies||[]).slice(0,5).forEach(t=>{badges+=`<span class="dbadge dbadge-tech">${t}</span>`;});
  document.getElementById('dash-badges').innerHTML=badges;
  const branches=proj.branches||{};let bhtml='';Object.entries(branches).forEach(([n,i])=>{bhtml+=`<span class="dbranch${i.current?' current':''}">${i.current?'● ':''}${n}</span>`;});
  document.getElementById('dash-branches').innerHTML=bhtml;
  let links='';if(ghUrl)links+=`<a class="dlink dlink-gh" href="${ghUrl}" target="_blank">GitHub ↗</a>`;if(localUrl)links+=`<a class="dlink dlink-folder" href="${localUrl}" target="_blank">Open Folder</a>`;document.getElementById('dash-links').innerHTML=links;
  dashboard.classList.add('open');
}
function hideDashboard(){dashboard.classList.remove('open');selectedIsland=null;}
document.getElementById('dash-close').addEventListener('click',e=>{e.stopPropagation();hideDashboard();});

renderer.domElement.addEventListener('click',event=>{
  if(isAnimating)return;mouse.set((event.clientX/innerWidth)*2-1,-(event.clientY/innerHeight)*2+1);raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickTargets);
  if(hits.length>0){const island=hits[0].object.userData.islandGroup;selectedIsland=island;const p=island.position;
    targetLookAt.copy(p);targetCamPos.copy(p).add(new THREE.Vector3(5,3.5,7));startCamPos.copy(camera.position);startTarget.copy(controls.target);animStart=performance.now();isAnimating=true;showDashboard(island.userData.project);}
  else{hideDashboard();targetLookAt.set(0,-1,0);targetCamPos.set(30,22,45);startCamPos.copy(camera.position);startTarget.copy(controls.target);animStart=performance.now();isAnimating=true;}
});

// ── Legend ───────────────────────────────────────────────────────────────────
const legend=document.getElementById('legend');const uGroups=[...new Set(repos.map(r=>r._group))];
uGroups.forEach(g=>{const r=repos.find(p=>p._group===g);const nb='#'+(r._nebula||0x888888).toString(16).padStart(6,'0');legend.innerHTML+=`<div class="legend-item"><span class="legend-dot" style="background:${nb}"></span>${g}</div>`;});

// ── Animation ────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.1);const t=performance.now()*.001;
  if(isAnimating){const p=Math.min((performance.now()-animStart)/DUR,1);const e=1-Math.pow(1-p,3);camera.position.lerpVectors(startCamPos,targetCamPos,e);controls.target.lerpVectors(startTarget,targetLookAt,e);if(p>=1)isAnimating=false;}

  // Animate all dynamic objects
  islands.forEach(island=>{
    island.traverse(child=>{
      if(child.userData?.dirty){child.position.y+=Math.sin(t*child.userData.speed+child.userData.offset)*.002;}
      if(child.userData?.rouletteBall){child.position.x=Math.cos(t*child.userData.speed)*child.userData.radius;child.position.z=Math.sin(t*child.userData.speed)*child.userData.radius;}
      if(child.userData?.molecule){child.position.y+=Math.sin(t*child.userData.speed)*.004;child.position.x+=Math.cos(t*child.userData.speed)*.003;}
      if(child.userData?.flow){child.position.y+=Math.sin(t*child.userData.speed+child.userData.offset)*.005;}
      if(child.userData?.pulse){const s=child.userData.baseScale*(1+Math.sin(t*child.userData.speed)*.2);child.scale.setScalar(s);}
      if(child.userData?.needle){child.rotation.y+=Math.sin(t*child.userData.speed)*.02;}
      if(child.userData?.orbiter){const o=child.userData;child.position.x=Math.cos(t*o.speed+o.angle)*o.radius;child.position.z=Math.sin(t*o.speed+o.angle)*o.radius;}
      if(child.userData?.swirl){const a=t*child.userData.speed+child.userData.offset;const r=.2+Math.sin(a)*.15;child.position.x=Math.cos(a)*r;child.position.z=Math.sin(a)*r;}
    });
  });

  // Nebulae
  scene.children.forEach(c=>{if(c.userData?.isNebula&&c.userData.material?.uniforms?.uTime){c.userData.material.uniforms.uTime.value=t;}});

  floaters.rotation.y+=dt*.02;floaters.rotation.x+=dt*.005;
  controls.update();renderer.render(scene,camera);
}

document.getElementById('hud-count').textContent=total;
document.getElementById('loading').classList.add('done');setTimeout(()=>document.getElementById('loading').remove(),600);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
animate();
</script>
